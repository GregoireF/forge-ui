# Why Dependabot and not Renovate:
# Renovate is more powerful for monorepos (groups related PRs, understands
# workspace protocols) but requires installing a GitHub App or running a
# self-hosted bot — setup cost is non-trivial.
# Dependabot is zero-config, native to GitHub, and integrates directly with
# GitHub Security Advisories (auto-closes advisory PRs when patched).
#
# Known limitation: Dependabot doesn't understand bun workspaces fully.
# It opens PRs at the package.json level it discovers, not workspace-wide.
# Vite + its plugins therefore generate separate PRs per playground directory.
# The groups below mitigate this within each directory.
#
# Why npm ecosystem (not bun):
# Dependabot has no Bun-specific ecosystem support.
# It reads package.json files via the "npm" ecosystem. Lock file updates
# (bun.lock) won't be committed by Dependabot — acceptable.
#
# open-pull-requests-limit: 5 per entry prevents a PR flood on first run.
# It does NOT mean 5 total; each ecosystem entry has its own counter.
#
# Major-version ignores (TypeScript, Astro): major bumps in critical tooling
# require a deliberate migration effort — they must not land silently via
# an auto-merged Dependabot PR. Pin to "< next major" and bump manually
# once the migration is tested end-to-end.

version: 2

updates:
  # ─── GitHub Actions ──────────────────────────────────────────────────────
  # Highest priority: SHA-pinned actions need security updates.
  # An outdated action with a known CVE in the runner could leak CI secrets.
  # Group ALL actions into one PR: they are independent from each other and
  # merging them individually adds no review value.
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 3
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # One PR for all GHA actions — they are orthogonal; reviewing them
      # together is faster and the blast radius is CI only.
      github-actions:
        patterns:
          - "*"

  # ─── Root devDependencies ────────────────────────────────────────────────
  # TypeScript, Biome, Vitest, Turbo, Lefthook, Changesets…
  - package-ecosystem: "npm"
    directory: "/"
    open-pull-requests-limit: 5
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:15"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
    ignore:
      # Workspace packages are managed by changesets — never auto-update.
      - dependency-name: "@forge-ui/*"
      # TypeScript major bumps (e.g. 5→6) require a dedicated migration:
      # exactOptionalPropertyTypes, decorators, and generics can all have
      # silent breaking changes. Evaluate manually before upgrading.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      playwright:
        patterns:
          - "@playwright/*"
          - "playwright"
      vitest:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "happy-dom"
      typescript-toolchain:
        patterns:
          - "typescript"
          - "@types/*"
          - "@biomejs/biome"
      changesets:
        patterns:
          - "@changesets/*"
          - "changesets"

  # ─── e2e workspace ───────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/e2e"
    open-pull-requests-limit: 3
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "e2e"
    commit-message:
      prefix: "chore(deps)"

  # ─── React playground ────────────────────────────────────────────────────
  # Playground deps affect only the dev server, not the published library.
  # Group Vite ecosystem: vite + @vitejs/plugin-react always move together.
  - package-ecosystem: "npm"
    directory: "/apps/playground-react"
    open-pull-requests-limit: 3
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:45"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "playground"
    commit-message:
      prefix: "chore(deps)"
    groups:
      vite-react:
        patterns:
          - "vite"
          - "@vitejs/*"

  # ─── Vue playground ──────────────────────────────────────────────────────
  # Group Vite ecosystem: vite + @vitejs/plugin-vue + vue-tsc move together.
  - package-ecosystem: "npm"
    directory: "/apps/playground-vue"
    open-pull-requests-limit: 3
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:50"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "playground"
    commit-message:
      prefix: "chore(deps)"
    groups:
      vite-vue:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "vue-tsc"

  # ─── Nuxt playground ─────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/apps/playground-nuxt"
    open-pull-requests-limit: 3
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:55"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "playground"
    commit-message:
      prefix: "chore(deps)"

  # ─── Docs site (Astro) ───────────────────────────────────────────────────
  # Astro major bumps (e.g. 5→7) require validating the docs build end-to-end.
  # Group the entire Astro ecosystem into one PR; ignore major version jumps.
  # When ready to upgrade: bump manually and validate `astro build` locally.
  - package-ecosystem: "npm"
    directory: "/apps/docs"
    open-pull-requests-limit: 3
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
      timezone: "Europe/Paris"
    labels:
      - "dependencies"
      - "docs"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "astro"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@astrojs/*"
        update-types: ["version-update:semver-major"]
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
