name: CI

# What this job guarantees:
# Lint + Typecheck + Unit tests (with coverage) + Build.
# This is the "code quality" signal. It is intentionally separate from E2E
# (see e2e.yml) so that a flaky browser test never turns this badge red.
#
# Invariant: if this job passes, the codebase is:
# 1. Lint-clean (Biome)
# 2. TypeScript-valid (strict mode, project references)
# 3. Unit-test-passing (Vitest + happy-dom)
# 4. Build-successful (Turbo → tsc project refs → dist/)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  ci:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          # Needed to install @gregoiref/* packages from GitHub Package Registry
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test with coverage
        run: bun run test:coverage

      - name: Upload coverage to Codecov
        # TODO: pin to a SHA hash once verified (run: gh release view -R codecov/codecov-action).
        # @v5 is used here because the previous @v4 was also unpinned;
        # upgrading to v5 picks up the latest security patches in the meantime.
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            packages/react/coverage/lcov.info,
            packages/vue/coverage/lcov.info,
            packages/primitives/accordion/coverage/lcov.info,
            packages/primitives/alert-dialog/coverage/lcov.info,
            packages/primitives/checkbox/coverage/lcov.info,
            packages/primitives/collapsible/coverage/lcov.info,
            packages/primitives/combobox/coverage/lcov.info,
            packages/primitives/dialog/coverage/lcov.info,
            packages/primitives/field/coverage/lcov.info,
            packages/primitives/hover-card/coverage/lcov.info,
            packages/primitives/popover/coverage/lcov.info,
            packages/primitives/progress/coverage/lcov.info,
            packages/primitives/radio-group/coverage/lcov.info,
            packages/primitives/select/coverage/lcov.info,
            packages/primitives/slider/coverage/lcov.info,
            packages/primitives/switch/coverage/lcov.info,
            packages/primitives/tabs/coverage/lcov.info,
            packages/primitives/tags-input/coverage/lcov.info,
            packages/primitives/tooltip/coverage/lcov.info
          flags: unit
          fail_ci_if_error: false

      - name: Build
        run: bun run build
