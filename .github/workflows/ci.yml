name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  ci:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          # Needed to install @gregoiref/* packages from GitHub Package Registry
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test with coverage
        run: bun run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            packages/react/coverage/lcov.info,
            packages/vue/coverage/lcov.info,
            packages/primitives/accordion/coverage/lcov.info,
            packages/primitives/alert-dialog/coverage/lcov.info,
            packages/primitives/checkbox/coverage/lcov.info,
            packages/primitives/collapsible/coverage/lcov.info,
            packages/primitives/combobox/coverage/lcov.info,
            packages/primitives/dialog/coverage/lcov.info,
            packages/primitives/field/coverage/lcov.info,
            packages/primitives/hover-card/coverage/lcov.info,
            packages/primitives/popover/coverage/lcov.info,
            packages/primitives/progress/coverage/lcov.info,
            packages/primitives/radio-group/coverage/lcov.info,
            packages/primitives/select/coverage/lcov.info,
            packages/primitives/slider/coverage/lcov.info,
            packages/primitives/switch/coverage/lcov.info,
            packages/primitives/tabs/coverage/lcov.info,
            packages/primitives/tags-input/coverage/lcov.info,
            packages/primitives/tooltip/coverage/lcov.info
          flags: unit
          fail_ci_if_error: false

      - name: Build
        run: bun run build

  e2e:
    name: E2E · axe-core · badge update
    runs-on: ubuntu-latest
    needs: ci
    # Badge commit only on push to main (not on PRs — no write permission)
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build packages (required for dev servers)
        run: bun run build

      - name: Install Playwright browsers
        run: bun x playwright install --with-deps chromium

      - name: Run E2E tests (Chromium only in CI)
        run: bun run test --project=chromium
        working-directory: e2e
        env:
          CI: true

      - name: Update axe badge
        run: node e2e/update-axe-badge.mjs

      - name: Commit badge update
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update axe-core badge [skip ci]"
          file_pattern: axe-badge.json
