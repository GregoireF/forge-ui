name: CI

# Guarantees on every push/PR to main:
# 1. Lint-clean (Biome)
# 2. TypeScript-valid (strict, project references)
# 3. Unit tests passing (Vitest + happy-dom) with coverage upload
# 4. Build successful (Turbo → tsc project refs → dist/)
#
# Kept intentionally separate from e2e.yml: a flaky browser test must never
# turn this badge red. Two independent signals, not one monolith.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  ci:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Cache Bun store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test with coverage
        run: bun run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: >-
            packages/react/coverage/lcov.info,
            packages/vue/coverage/lcov.info,
            packages/core/coverage/lcov.info,
            packages/primitives/accordion/coverage/lcov.info,
            packages/primitives/alert-dialog/coverage/lcov.info,
            packages/primitives/avatar/coverage/lcov.info,
            packages/primitives/checkbox/coverage/lcov.info,
            packages/primitives/collapsible/coverage/lcov.info,
            packages/primitives/combobox/coverage/lcov.info,
            packages/primitives/date-field/coverage/lcov.info,
            packages/primitives/date-picker/coverage/lcov.info,
            packages/primitives/date-range-picker/coverage/lcov.info,
            packages/primitives/dialog/coverage/lcov.info,
            packages/primitives/field/coverage/lcov.info,
            packages/primitives/hover-card/coverage/lcov.info,
            packages/primitives/menu/coverage/lcov.info,
            packages/primitives/number-input/coverage/lcov.info,
            packages/primitives/popover/coverage/lcov.info,
            packages/primitives/progress/coverage/lcov.info,
            packages/primitives/radio-group/coverage/lcov.info,
            packages/primitives/select/coverage/lcov.info,
            packages/primitives/separator/coverage/lcov.info,
            packages/primitives/slider/coverage/lcov.info,
            packages/primitives/switch/coverage/lcov.info,
            packages/primitives/tabs/coverage/lcov.info,
            packages/primitives/tags-input/coverage/lcov.info,
            packages/primitives/time-picker/coverage/lcov.info,
            packages/primitives/toggle/coverage/lcov.info,
            packages/primitives/toggle-group/coverage/lcov.info,
            packages/primitives/tooltip/coverage/lcov.info,
            packages/primitives/visually-hidden/coverage/lcov.info
          flags: unit
          fail_ci_if_error: false

      - name: Build
        run: bun run build
