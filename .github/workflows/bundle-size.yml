name: Bundle Size

# Why this exists:
# forge-ui is a consumer-facing library. Every byte added to a connect function
# is paid by the end user who downloads the consuming app. Without a size gate,
# we could silently regress (e.g. a utility import that pulls in lodash).
#
# The existing tooling/scripts/bundle-size.ts uses esbuild to tree-shake,
# minify, and measure gzip + brotli per primitive. Thresholds are per-primitive
# and calibrated against Radix UI and Zag.js public benchmarks.
#
# Why on pull_request only (not push):
# Size regressions are introduced in PRs. Reporting after the fact on main
# is too late. PR comments give actionable, in-context feedback.
#
# Why not size-limit (the popular alternative):
# We already have a custom script that (a) understands our monorepo structure,
# (b) measures per primitive (not per framework binding), and (c) includes
# competitor reference sizes. Adding size-limit would duplicate this.

on:
  pull_request:
    branches: [main]
    paths:
      # Only run when source code changes — not on docs, CI config, tests
      - "packages/**"
      - "tooling/scripts/bundle-size.ts"
      - ".github/workflows/bundle-size.yml"

  push:
    branches: [main]
    paths:
      - "packages/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  bundle-size:
    name: Bundle size check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build packages
        run: bun run build

      - name: Run bundle size analysis
        id: size
        # --fail-on-threshold exits with code 1 if any primitive exceeds its threshold.
        # We capture the output for the PR comment and badge update.
        run: bun run size:ci 2>&1 | tee /tmp/bundle-report.txt; echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post PR comment
        # Only on PRs — push to main doesn't need a comment.
        if: github.event_name == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/bundle-report.txt', 'utf8');
            const exitCode = '${{ steps.size.outputs.exit_code }}';
            const status = exitCode === '0' ? '✅ All primitives under budget' : '❌ Bundle size threshold exceeded';
            const body = `## Bundle Size Report\n\n${status}\n\n\`\`\`\n${report}\n\`\`\`\n\n*Thresholds calibrated against Radix UI and Zag.js public benchmarks.*`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('Bundle Size Report') && c.user.login === 'github-actions[bot]');
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Update bundle size badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # Inline badge update: green if under budget, red if over.
        # We don't report exact bytes in the badge because the badge represents
        # the budget status, not a specific size (sizes vary per primitive).
        run: |
          EXIT="${{ steps.size.outputs.exit_code }}"
          if [ "$EXIT" = "0" ]; then
            MSG="under budget"
            COLOR="brightgreen"
          else
            MSG="over budget"
            COLOR="critical"
          fi
          node -e "
            const fs = require('fs');
            const badge = { schemaVersion: 1, label: 'bundle size', message: '$MSG', color: '$COLOR' };
            fs.writeFileSync('bundle-size-badge.json', JSON.stringify(badge, null, 2) + '\n');
          "

      - name: Commit bundle badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: update bundle size badge [skip ci]"
          file_pattern: bundle-size-badge.json

      - name: Fail if over threshold
        if: steps.size.outputs.exit_code != '0'
        run: |
          echo "::error::Bundle size threshold exceeded. See the PR comment for details."
          exit 1
