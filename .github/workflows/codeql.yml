name: CodeQL

# Why this exists:
# Even a UI component library has SAST-detectable vulnerabilities:
# - XSS vectors: if a connect function ever uses innerHTML or textContent
#   with unsanitized user values (e.g. aria-label from props)
# - Prototype pollution in state machine transitions
# - Regex DoS in validation patterns
# - Incorrect use of dangerouslySetInnerHTML in the React binding
#
# Why NOT blocking PRs:
# CodeQL scans take 3-8 minutes. Blocking every PR on an 8-minute scan creates
# friction. Instead: run on push to main (catches what merged) + weekly schedule
# (catches newly published CVEs in existing code). Security advisories are raised
# automatically via GitHub Advanced Security.
#
# Why javascript-typescript combined query suite:
# Our codebase is TypeScript-first. The combined suite runs both JS and TS
# queries, which is more complete than JS-only (default). TypeScript-aware
# queries can track types through generics and detect type-unsafe patterns.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Monday at 02:00 UTC — catches newly published CVEs affecting existing code.
    - cron: "0 2 * * 1"

permissions: read-all

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
          # extended suite: includes security-and-quality queries (not just security).
          # This catches code-quality issues (dead code, incorrect equality checks)
          # that pure security suites miss.
          queries: security-and-quality

      - name: Autobuild
        # TypeScript projects need compilation for accurate data-flow analysis.
        # Autobuild runs tsc in the detected tsconfig roots.
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
