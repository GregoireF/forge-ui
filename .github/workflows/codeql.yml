name: CodeQL

# SAST for a UI component library: XSS vectors in connect functions (innerHTML,
# textContent with unsanitized props), prototype pollution in state machine
# transitions, regex DoS in validation, dangerouslySetInnerHTML misuse.
#
# Not blocking PRs: CodeQL takes 3-8 min. Blocking creates friction without
# equivalent signal — security advisories are raised async via GitHub Advanced
# Security. Runs on push to main + weekly schedule (catches newly published CVEs).
#
# javascript-typescript combined suite: TypeScript-aware queries track types
# through generics, catching type-unsafe patterns the JS-only suite misses.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * 1"

permissions: read-all

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@45775bd8235c68ba998cffa5171334d58593da47 # v3.28.15
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@45775bd8235c68ba998cffa5171334d58593da47 # v3.28.15

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@45775bd8235c68ba998cffa5171334d58593da47 # v3.28.15
        with:
          category: "/language:${{ matrix.language }}"
