name: E2E

# Why separate from ci.yml:
# Unit tests + typecheck are stable. E2E exercises real browsers and can be
# transiently flaky (WebKit pointer events, Nuxt SSR cold start). A flaky
# browser test must NOT turn the code-quality badge red.
#
# Why 3 browsers:
# - Chromium: reference implementation, Chrome + Edge (~70% desktop share)
# - Firefox: Gecko engine, ARIA tree ahead of spec, 10% market share
# - WebKit: Safari + ALL iOS browsers (iOS WebKit is mandatory)

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/commitlint.yml"
      - ".github/workflows/release.yml"
      - ".github/workflows/bundle-size.yml"
      - ".github/workflows/codeql.yml"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  e2e:
    name: E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: latest

      - name: Cache Bun store
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build packages
        run: bun run build

      - name: Install Playwright browser
        # Install only the target browser — ~90s vs ~4min for all three.
        run: bun x playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests
        run: bun run test --project=${{ matrix.browser }}
        working-directory: e2e
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: e2e-results-${{ matrix.browser }}
          path: e2e/test-results/
          retention-days: 7

  # Badge update: only on push to main, only when all browsers pass.
  # Chromium is used exclusively for the axe badge (a11y violations are
  # attribute-based, engine-independent; a WebKit pointer-event failure ≠ a11y violation).
  axe-badge:
    name: Update axe badge
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "24"

      - name: Download Chromium test results
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f422bc89 # v4.2.1
        with:
          name: e2e-results-chromium
          path: e2e/test-results

      - name: Update axe badge
        run: node e2e/update-axe-badge.mjs

      - name: Commit badge
        uses: stefanzweifel/git-auto-commit-action@8621497c8c39c72f3e2a999a26b4ca1b5058a842 # v5.0.1
        with:
          commit_message: "chore: update axe-core badge [skip ci]"
          file_pattern: axe-badge.json
