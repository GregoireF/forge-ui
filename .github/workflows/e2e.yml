name: E2E

# Why separate from ci.yml:
# Unit tests + typecheck are stable. E2E exercises real browsers and can be
# transiently flaky (WebKit pointer events, Nuxt SSR cold start). A flaky
# browser test must NOT turn the code-quality badge red.
#
# Why 3 browsers:
# - Chromium: reference implementation, Chrome + Edge (~70% desktop share)
# - Firefox: Gecko engine, ARIA tree ahead of spec, 10% market share
# - WebKit: Safari + ALL iOS browsers (iOS WebKit is mandatory)

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/commitlint.yml"
      - ".github/workflows/release.yml"
      - ".github/workflows/bundle-size.yml"
      - ".github/workflows/codeql.yml"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  e2e:
    name: E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Cache Bun store
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build packages
        run: bun run build

      - name: Install Playwright browser
        # Install only the target browser — ~90s vs ~4min for all three.
        run: bun x playwright install --with-deps ${{ matrix.browser }}

      - name: Run E2E tests
        run: bun run test --project=${{ matrix.browser }}
        working-directory: e2e
        env:
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-results-${{ matrix.browser }}
          path: e2e/test-results/
          retention-days: 7

  # Badge update: only on push to main, only when all browsers pass.
  # Chromium is used exclusively for the axe badge (a11y violations are
  # attribute-based, engine-independent; a WebKit pointer-event failure ≠ a11y violation).
  axe-badge:
    name: Update axe badge
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Download Chromium test results
        uses: actions/download-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317 # v4.2.1
        with:
          name: e2e-results-chromium
          path: e2e/test-results

      - name: Update axe badge
        run: node e2e/update-axe-badge.mjs

      - name: Commit badge
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_message: "chore: update axe-core badge [skip ci]"
          file_pattern: axe-badge.json
