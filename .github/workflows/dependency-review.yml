name: Dependency Review

# Synchronous CVE gate: blocks a PR before a vulnerable dependency lands on main.
# Distinct from Renovate security alerts (which are async, post-merge).
#
# Runs on pull_request only — the review compares HEAD to base branch.
# On push to main there is no "before" to compare against.
#
# License allowlist: we distribute a library. GPL/AGPL/LGPL would force
# consumers to open-source their apps. Only permissive licenses allowed.

on:
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Dependency review
        uses: actions/dependency-review-action@3b139cfc5fae8b618d3eae3675e383bb1769c019 # v4.5.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-2.0, LGPL-2.1, LGPL-3.0
          comment-summary-in-pr: always
